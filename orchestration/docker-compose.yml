services:
  neo4j:
    image: neo4j:5.26
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/neo4j-password}
    ports:
      - "${NEO4J_HTTP_PORT_HOST:-7475}:7474"
      - "${NEO4J_BOLT_PORT_HOST:-7688}:7687"
    volumes:
      - neo4j_orchestration_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u ${NEO4J_USERNAME:-neo4j} -p ${NEO4J_PASSWORD:-neo4j-password} 'RETURN 1;' || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  orchestration:
    build:
      context: ..
      dockerfile: orchestration/Dockerfile
    working_dir: /workspace
    env_file:
      - .env
    volumes:
      - ../:/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j-password}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      ALLOW_MOCK_FALLBACK_DATA: ${ALLOW_MOCK_FALLBACK_DATA:-false}
    command:
      [
        "sh",
        "-c",
        "python -m orchestration.app.cli bootstrap sample-db && python -m orchestration.app.cli run sample --review-action continue",
      ]

volumes:
  neo4j_orchestration_data:
