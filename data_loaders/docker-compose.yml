services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ./:/app
      - ./data:/app/data
    environment:
      DATA_DIR: ${DATA_DIR:-/app/data}
      # Default to a host Neo4j instance exposed on the custom project port.
      NEO4J_URI: ${NEO4J_URI:-bolt://host.docker.internal:7688}
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j-password}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      NEO4J_BATCH_SIZE: ${NEO4J_BATCH_SIZE:-2000}
      NEO4J_MAX_RETRIES: ${NEO4J_MAX_RETRIES:-3}
      NEO4J_RETRY_BACKOFF_SECONDS: ${NEO4J_RETRY_BACKOFF_SECONDS:-1.0}
      MAX_PUBMED_FILES: ${MAX_PUBMED_FILES:-5}
      MAX_PROTEINS: ${MAX_PROTEINS:-20000}
      STRING_SCORE_THRESHOLD: ${STRING_SCORE_THRESHOLD:-700}
      PUBMED_YEAR_MIN: ${PUBMED_YEAR_MIN:-2015}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      STRING_DOWNLOAD_ENABLED: ${STRING_DOWNLOAD_ENABLED:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint: ["python", "-m", "app.cli"]

  neo4j:
    image: neo4j:5.24
    profiles: ["neo4j"]
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-neo4j-password}
      NEO4J_server_memory_heap_initial__size: 1G
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 1G
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    ports:
      - "7475:7474"
      - "7688:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
